<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>O!Bank - Процесс ЗПП</title>
    <link rel="stylesheet" href="scheme.css">
</head>
<body>
    <header class="header">
        <div class="logo-zone"><span>O!BANK</span></div>
        <div class="nav-right">
            <button class="lang-btn active" id="btn-ru" onclick="changeLang('ru')">RU</button>
            <button class="lang-btn" id="btn-en" onclick="changeLang('en')">EN</button>
        </div>
    </header>

    <div class="scheme-container">
        <!-- СХЕМА -->
        <div class="graph-area">
            <div class="flowchart-wrapper">
                <div class="process-grid">
                    <!-- Блоки -->
                    <div class="node-card active" data-node="O1" id="n1" onclick="showProblems('O1')">
                        <span class="node-badge">РБ, СОЮФЛ</span>
                        <div class="node-title">Привлечение</div>
                    </div>
                    <div class="arrow-h"></div>
                    <div class="node-card" data-node="O2" id="n2" onclick="showProblems('O2')">
                        <span class="node-badge">РБ</span>
                        <div class="node-title">Подписание договора</div>
                    </div>
                    <div class="arrow-h"></div>
                    <div class="node-card node-warning" data-node="O4" id="n4" onclick="showProblems('O4')">
                        <span class="node-badge">РБ, ГБ</span>
                        <div class="node-title">Служебная записка</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- БОКОВАЯ ПАНЕЛЬ С ПРОБЛЕМАМИ -->
        <div class="details-panel">
            <div class="panel-glass-content">
                <h4 id="panel-pain-title">🚨 Описание проблем</h4>
                <ul class="pain-list" id="node-pain-list"></ul>
            </div>
        </div>
    </div>

    <script>
        const data = {
            ru: { pains: ["Нет централизованного отдела", "Низкий уровень автоматизации"] },
            en: { pains: ["No centralized department", "Low level of automation"] }
        };

        function showProblems(nodeId) {
            document.querySelectorAll('.node-card').forEach(x => x.classList.remove('active'));
            document.getElementById(`n${nodeId.slice(1)}`).classList.add('active');
            
            const list = document.getElementById('node-pain-list');
            list.innerHTML = data.ru.pains.map(p => `<li>${p}</li>`).join('');
        }
        
        window.onload = () => showProblems('O1');
    </script>
</body>
</html>

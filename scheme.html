<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>O!Bank - To Be Scheme</title>
    <link rel="stylesheet" href="scheme.css">
</head>
<body>

<div class="scheme-container">
    <div class="graph-area">
        <div class="scheme-section-title future">🟢 Целевой процесс (To Be)</div>
        <div class="process-grid">
            <div class="node-card">О1-О2 Привлечение</div>
            <div class="css-arrow"></div>
            <div class="node-card">О3-О8 Согласование</div>
            <div class="css-arrow"></div>
            <div class="node-card">О9-О10 Изготовление</div>
        </div>
    </div>

    <div class="details-panel">
        <div class="panel-block">
            <h4>🚨 Описание проблем</h4>
            <ul class="pain-list">
                <li>Нет централизованного отдела</li>
                <li>Низкий уровень автоматизации</li>
            </ul>
        </div>
        <div class="panel-block">
            <h4 style="color: #10b981;">🚀 Что мы исключаем</h4>
            <ul class="pain-list">
                <li>Исключены дублирующие проверки</li>
                <li>Сокращен Time-to-Market</li>
                <li>Автоматический BPM-трекинг</li>
            </ul>
        </div>
    </div>
</div>

</body>
</html>

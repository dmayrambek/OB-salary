<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TO-BE схема</title>
<link rel="stylesheet" href="to-be.css">
</head>
<body>

<!-- Переключатель -->
<div class="lang-switch">
    <button onclick="setLang('ru')">RU</button>
    <button onclick="setLang('en')">EN</button>
</div>

<div class="wrapper">

    <div class="column">
        <div class="title" data-key="directSales"></div>
        <div class="box" data-key="client"></div>
        <div class="box" data-key="contract"></div>
    </div>

    <div class="column">
        <div class="title" data-key="retail"></div>
        <div class="box" data-key="client"></div>
        <div class="box" data-key="contract"></div>
    </div>

    <div class="column big">
        <div class="title" data-key="operations"></div>
        <div class="box" data-key="o1"></div>
        <div class="box" data-key="o2"></div>
        <div class="box" data-key="o3"></div>
        <div class="box" data-key="o4"></div>
        <div class="box" data-key="o5"></div>
        <div class="box" data-key="o6"></div>
    </div>

    <div class="column">
        <div class="title" data-key="headBank"></div>
        <div class="box" data-key="h1"></div>
        <div class="box" data-key="h2"></div>
    </div>

</div>

<!-- SVG стрелки -->
<svg class="arrows">

    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7"
        refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#2e8b57"/>
        </marker>
    </defs>

    <line x1="180" y1="140" x2="260" y2="140" class="arrow"/>
    <line x1="420" y1="140" x2="520" y2="140" class="arrow"/>
    <line x1="700" y1="180" x2="700" y2="260" class="arrow"/>
    <line x1="880" y1="220" x2="980" y2="220" class="arrow"/>

</svg>

<!-- Нижний блок -->
<div class="bottom">

    <div class="down-arrow">↓</div>

    <div class="future-box">
        <h3 data-key="futureTitle"></h3>
        <ul>
            <li data-key="f1"></li>
            <li data-key="f2"></li>
        </ul>
    </div>

</div>

<script src="to-be.js"></script>
</body>
</html>

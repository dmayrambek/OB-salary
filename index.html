<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>О!Банк — Зарплатный проект</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">O!Bank</a>
    <div class="nav-controls">
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
        <span class="theme-icon-dark">☀</span>
        <span class="theme-icon-light">☾</span>
      </button>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </div>
</nav>

<section class="hero" id="hero">
  <div class="hero-bg-grid"></div>
  <div class="holo-glow-bg"></div>

  <div class="holo-header">
    <h1 class="hero-title"
      data-ru="Зарплатный проект · О!Банк · Презентация"
      data-en="Salary Project · O!Bank · Presentation">
      Зарплатный проект · О!Банк · Презентация
    </h1>
  </div>

  <div class="holo-canvas" style="width:860px;max-width:calc(100vw - 48px);height:340px;">
    <svg class="holo-svg" viewBox="0 0 860 340" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="harr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
          <path d="M0,1 L7,4 L0,7" stroke="rgba(232,0,90,0.7)" stroke-width="1.2" fill="none"/>
        </marker>
      </defs>
      <!-- 01 правый край → 02 левый край -->
      <path d="M 215,160 C 260,160 290,90 322,80"
            stroke="rgba(232,0,90,0.3)" stroke-width="1" fill="none" marker-end="url(#harr)"/>
      <!-- 02 правый край → 03 левый край -->
      <path d="M 537,80 C 580,80 610,140 644,155"
            stroke="rgba(232,0,90,0.3)" stroke-width="1" fill="none" marker-end="url(#harr)"/>
    </svg>

    <!-- 01 Marketing Research -->
    <div class="hc" onclick="location.href='marketing.html'" style="left:0px;top:100px;width:215px;">
      <div class="hc-scan"></div>
      <div class="hc-c hc-ctl"></div><div class="hc-c hc-ctr"></div>
      <div class="hc-c hc-cbl"></div><div class="hc-c hc-cbr"></div>
      <div class="hc-num">01</div>
      <div class="hc-title" data-ru="Marketing Research" data-en="Marketing Research">Marketing Research</div>
      <div class="hc-sub" data-ru="анализ рынка КР" data-en="of top Banks in KR">анализ рынка КР</div>
      <div class="hc-dot"></div>
    </div>

    <!-- 02 Текущая схема -->
    <div class="hc" onclick="location.href='scheme.html'" style="left:322px;top:10px;width:215px;">
      <div class="hc-scan"></div>
      <div class="hc-c hc-ctl"></div><div class="hc-c hc-ctr"></div>
      <div class="hc-c hc-cbl"></div><div class="hc-c hc-cbr"></div>
      <div class="hc-num">02</div>
      <div class="hc-title" data-ru="Текущая схема" data-en="Current Scheme">Текущая схема</div>
      <div class="hc-sub" data-ru="процессы ЗПП" data-en="SP processes">процессы ЗПП</div>
      <div class="hc-dot" style="animation-delay:0.6s"></div>
    </div>

    <!-- 03 Текущие данные -->
    <div class="hc" onclick="location.href='current_data.html'" style="left:644px;top:100px;width:215px;">
      <div class="hc-scan"></div>
      <div class="hc-c hc-ctl"></div><div class="hc-c hc-ctr"></div>
      <div class="hc-c hc-cbl"></div><div class="hc-c hc-cbr"></div>
      <div class="hc-num">03</div>
      <div class="hc-title" data-ru="Текущие данные" data-en="Current Data">Текущие данные</div>
      <div class="hc-sub" data-ru="отчёты · аналитика" data-en="reports · analytics">отчёты · аналитика</div>
      <div class="hc-dot" style="animation-delay:1.2s"></div>
    </div>

  </div>
</section>

<script src="main.js"></script>
</body>
</html>

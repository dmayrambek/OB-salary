<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>О!Банк — Зарплатный проект</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">O!Bank</a>
    <div class="nav-controls">
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
        <span class="theme-icon-dark">☀</span>
        <span class="theme-icon-light">☾</span>
      </button>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </div>
</nav>

<section class="hero" id="hero">
  <div class="hero-bg-grid"></div>
  <div class="holo-glow-bg"></div>

  <div class="holo-header">
    <div class="hero-tag"
      data-ru="Зарплатный проект · О!Банк · 2026"
      data-en="Payroll Project · O!Bank · 2026">
      Зарплатный проект · О!Банк · 2026
    </div>

    <h1 class="hero-title"
      data-ru="Выберите раздел"
      data-en="Select Section">
      Выберите раздел
    </h1>
  </div>

  <div class="holo-canvas">
    <!-- СВЯЗУЮЩИЕ ЛИНИИ (SVG) -->
    <svg class="holo-svg" viewBox="0 0 820 360" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="harr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
          <path d="M0,1 L7,4 L0,7" stroke="rgba(255,255,255,0.18)" stroke-width="1" fill="none"/>
        </marker>
      </defs>

      <path d="M 165,189 C 210,160 255,85 290,69"
            stroke="rgba(232,0,90,0.2)"
            stroke-width="0.8"
            fill="none"
            marker-end="url(#harr)"/>

      <path d="M 445,69 C 498,69 548,168 570,218"
            stroke="rgba(232,0,90,0.2)"
            stroke-width="0.8"
            fill="none"
            marker-end="url(#harr)"/>

      <path d="M 648,263 C 648,308 450,318 395,330"
            stroke="rgba(232,0,90,0.2)"
            stroke-width="0.8"
            fill="none"
            marker-end="url(#harr)"/>
    </svg>

    <!-- 01. Маркетинг -->
    <div class="hc" onclick="location.href='marketing.html'" style="left:10px;top:125px;">
      <div class="hc-scan"></div>
      <div class="hc-c hc-ctl"></div><div class="hc-c hc-ctr"></div>
      <div class="hc-c hc-cbl"></div><div class="hc-c hc-cbr"></div>
      <div class="hc-num">01</div>
      <div class="hc-title" data-ru="Marketing Research" data-en="Marketing Research">Marketing Research</div>
      <div class="hc-sub" data-ru="анализ рынка КР" data-en="market analysis">анализ рынка КР</div>
      <div class="hc-dot"></div>
    </div>

    <!-- 02. Текущая схема -->
    <div class="hc" onclick="location.href='scheme.html'" style="left:290px;top:15px;">
      <div class="hc-scan"></div>
      <div class="hc-c hc-ctl"></div><div class="hc-c hc-ctr"></div>
      <div class="hc-c hc-cbl"></div><div class="hc-c hc-cbr"></div>
      <div class="hc-num">02</div>
      <div class="hc-title" data-ru="Текущая схема" data-en="Current Scheme">Текущая схема</div>
      <div class="hc-sub" data-ru="процессы ЗПП" data-en="Payroll processes">процессы ЗПП</div>
      <div class="hc-dot" style="animation-delay:0.6s"></div>
    </div>

    <!-- 03. Текущие данные -->
    <div class="hc" onclick="location.href='reports.html'" style="left:570px;top:155px;">
      <div class="hc-scan"></div>
      <div class="hc-c hc-ctl"></div><div class="hc-c fuse-ctr"></div>
      <div class="hc-c hc-cbl"></div><div class="hc-c hc-cbr"></div>
      <div class="hc-num">03</div>
      <div class="hc-title" data-ru="Текущие данные" data-en="Current Data">Текущие данные</div>
      <div class="hc-sub" data-ru="отчёты · аналитика" data-en="Reports · analytics">отчёты · аналитика</div>
      <div class="hc-dot" style="animation-delay:1.2s"></div>
    </div>

    <!-- 04. Продажи и пакеты -->
    <div class="hc" onclick="location.href='sales.html'" style="left:240px;top:270px;">
      <div class="hc-scan"></div>
      <div class="hc-c hc-ctl"></div><div class="hc-c hc-ctr"></div>
      <div class="hc-c hc-cbl"></div><div class="hc-c hc-cbr"></div>
      <div class="hc-num">04</div>
      <div class="hc-title" data-ru="Продажи и пакеты" data-en="Sales & Packages">Продажи и пакеты</div>
      <div class="hc-sub" data-ru="тарифы · предложение" data-en="Rates · offering">тарифы · предложение</div>
      <div class="hc-dot" style="animation-delay:1.8s"></div>
    </div>

  </div>
</section>

<script src="main.js"></script>
</body>
</html>
